
[default]

# Logger output level.
# Note: Consider providing this via environment variable instead.
# Use: [DEBUG, INFO, WARNING, ERROR, CRITICAL]
log_level = "INFO"

# The token used to log into the Discord bot.
# Note: Consider providing this via environment variable instead.
bot_token = "<bot_token>"

# Whether the observer should ignore bot messages.
observer_bot_ignore = false

# Channels that should be observed.
# Note: Do not include your target channel (where webhook messages are sent)
#       It WILL result in an infinite loop of the same message being sent.
observer_channels = ["<list_of_channel_ids"]

# List of strings to match messages against
# Messages that satisfy this pattern will trigger the webhook send.
observer_patterns = ["<list_of_string_patterns>"]

# Whether observer should respect case when matching against messages.
observer_case_sensitive = false

# Whether the observer should send valid messages using a webhook.
webhook_active = false

# The webhook URL used to send valid messages to.
webhook_url = ""

# The name used when sending the webhook.
# This will default to the original sender's display name.
webhook_name = ""

# The avatar used when sending the webhook.
# This will default to the original sender's avatar.
webhook_avatar_url = ""

# Whether to send the message as an embed
# Use: [custom, original, none]
webhook_embed_state = "original"

webhook_embed.title = "<embed_title>"
webhook_embed.description = "<embed_description>"
webhook_embed.url = "<embed_url>"
webhook_embed.color = "<embed_color>"
webhook_embed.thumbnail_url = "<embed_thumbnail_url>"
webhook_embed.image_url = "<embed_image_url>"

webhook_embed.footer.text = "<embed_footer_text>"
webhook_embed.footer.icon_url = "<embed_footer_icon_url>"

webhook_embed.author.name = "<embed_author_name>"
webhook_embed.author.url = "<embed_author_url>"
webhook_embed.author.icon_url = "<embed_author_icon_url>"

webhook_embed.fields.1.name = "<embed_fields_1_name>"
webhook_embed.fields.1.value = "<embed_fields_1_value>"
webhook_embed.fields.1.inline = true

webhook_embed.fields.2.name = "<embed_fields_2_name>"
webhook_embed.fields.2.value = "<embed_fields_2_value>"
webhook_embed.fields.2.inline = true
